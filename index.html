<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D-Day Manager</title>

<!-- 고급 폰트 -->
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Pretendard', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #e2e8f0;
  margin: 0;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

h1 {
  text-align: center;
  font-weight: 700;
  letter-spacing: -0.5px;
}

input, select {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.05);
  color: white;
  backdrop-filter: blur(10px);
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
}

.task {
  margin-top: 14px;
  padding: 16px;
  border-radius: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  backdrop-filter: blur(10px);
  transition: 0.2s;
}

.task:hover {
  transform: translateY(-3px);
}

.urgent { background: linear-gradient(135deg, #ef4444, #dc2626); }
.normal { background: linear-gradient(135deg, #f59e0b, #d97706); }
.safe { background: linear-gradient(135deg, #10b981, #059669); }

.done {
  opacity: 0.4;
  text-decoration: line-through;
}

.title {
  font-size: 15px;
  font-weight: 600;
}

.dday {
  font-size: 13px;
  opacity: 0.8;
}

.actions button {
  padding: 6px 10px;
  margin-left: 5px;
  border-radius: 8px;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="container">
  <h1>📅 D-Day</h1>

  <input type="text" id="title" placeholder="할 일 입력">
  <input type="date" id="date">

  <select id="category">
    <option>📚 공부</option>
    <option>📝 과제</option>
    <option>🎯 목표</option>
  </select>

  <button onclick="addTask()">추가하기</button>

  <div id="list"></div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function save() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function getDays(date) {
  const today = new Date();
  const due = new Date(date);
  return Math.ceil((due - today) / (1000*60*60*24));
}

function addTask() {
  const title = document.getElementById("title").value;
  const date = document.getElementById("date").value;
  const category = document.getElementById("category").value;

  if (!title || !date) return alert("다 입력해");

  tasks.push({ title, date, category, done:false });
  save();
  render();
}

function removeTask(i) {
  tasks.splice(i, 1);
  save();
  render();
}

function toggleDone(i) {
  tasks[i].done = !tasks[i].done;
  save();
  render();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  tasks.sort((a,b)=>getDays(a.date)-getDays(b.date));

  tasks.forEach((t,i)=>{
    const days = getDays(t.date);
    const div = document.createElement("div");

    let cls = "safe";
    if (days <= 3) cls = "urgent";
    else if (days <= 7) cls = "normal";

    div.className = `task ${cls} ${t.done ? "done":""}`;

    div.innerHTML = `
      <div>
        <div class="title">${t.category} ${t.title}</div>
        <div class="dday">${days <= 0 ? "🔥 D-day" : "D-"+days}</div>
      </div>
      <div class="actions">
        <button onclick="toggleDone(${i})">✔</button>
        <button onclick="removeTask(${i})">✖</button>
      </div>
    `;

    list.appendChild(div);
  });
}

render();
</script>

</body>
</html>
